apiVersion: apps/v1
kind: Deployment
metadata:
  name: dep1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-demo
  template:
    metadata:
      labels:
        app: flask-demo
    spec:
      imagePullSecrets:
        - name: dockerhub-secret
      containers:
      - name: cont1
        image: vickybulti/flask-demo:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: np1
spec:
  type: NodePort
  selector:
    app: flask-demo
  ports:
  - port: 80
    targetPort: 5000
